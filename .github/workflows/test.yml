name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set Xcode 16.3
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.3.app

      - name: iOS Build 
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: macOS Build 
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk macosx \
            -destination 'platform=macosx' \

      - name: tvOS Build 
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk appletvsimulator \
            -destination 'platform=tvOS Simulator,name=Apple TV' \

      - name: visionOS Build 
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk xrsimulator \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro' \

      - name: iOS Tests
        run: |
          xcodebuild test \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: macOS Tests
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk macosx \
            -destination 'platform=macosx' \
            test

      - name: tvOS Tests
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk appletvsimulator \
            -destination 'platform=tvOS Simulator,name=Apple TV' \
            test

      - name: visionOS Tests
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk xrsimulator \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro' \
            test
