name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Do a dry run to preview instead of a real release"
        required: true
        default: "true"

jobs:
  authorize:
    name: Authorize
    runs-on: macos-15
    steps:
      - name: ${{ github.actor }} permission check to do a release
        uses: octokit/request-action@57ec46afcc4c58c813af3afe67e57ced1ea9f165 # v2.0.0
        with:
          route: GET /repos/:repository/collaborators/${{ github.actor }}
          repository: ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: macos-15
    needs: [authorize]
    steps:

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set Xcode 16.3
        run: |
          sudo xcode-select -switch /Applications/Xcode_16.3.app

      - name: Install Apple platform SDKs
        run: |
          # Warm up CoreSimulator to avoid "Unable to connect to simulator":
          # https://github.com/actions/runner-images/issues/12862#issuecomment-3239326872
          xcrun simctl list > /dev/null
          sudo xcodebuild -downloadPlatform iOS
          sudo xcodebuild -downloadPlatform tvOS
          # watchOS runtime is not built directly but pod lib lint validates
          # every platform the podspec declares, including watchOS
          sudo xcodebuild -downloadPlatform watchOS
          sudo xcodebuild -downloadPlatform visionOS

      - name: iOS Build
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: macOS Build 
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk macosx \
            -destination 'platform=macOS' \

      - name: tvOS Build 
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk appletvsimulator \
            -destination 'platform=tvOS Simulator,name=Apple TV' \

      - name: visionOS Build
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk xrsimulator \
            -destination 'platform=visionOS Simulator,OS=2.4,name=Apple Vision Pro' \

      - name: iOS Tests
        run: |
          xcodebuild test \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: macOS Tests
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk macosx \
            -destination 'platform=macOS' \
            test

      - name: tvOS Tests
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk appletvsimulator \
            -destination 'platform=tvOS Simulator,name=Apple TV' \
            test

      - name: visionOS Tests
        run: |
          xcodebuild \
            -project AnalyticsConnector.xcodeproj \
            -scheme AnalyticsConnector \
            -sdk xrsimulator \
            -destination 'platform=visionOS Simulator,OS=2.4,name=Apple Vision Pro' \
            test

      - name: Validate Podfile
        run: pod lib lint --allow-warnings

      - name: Build xcframework
        run: scripts/build_framework.sh
      
      - name: Zip xcframework
        working-directory: .build/artifacts
        run: zip -r -y AnalyticsConnector.xcframework.zip AnalyticsConnector.xcframework

      - name: Update Checksum
        run: |
          CHECKSUM=$(xcrun swift package compute-checksum .build/artifacts/AnalyticsConnector.xcframework.zip) && \
          sed -i '' -E "s/(checksum: \")[^\"]*(\")/\1$CHECKSUM\2/" Package.swift && \
          sed -i '' -E "s/(checksum: \")[^\"]*(\")/\1$CHECKSUM\2/" Package@swift-5.9.swift && \
          sed -i '' -E "s/(checksum: \")[^\"]*(\")/\1$CHECKSUM\2/" Package@swift-6.4.swift

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Semantic Release --dry-run
        if: ${{ github.event.inputs.dryRun == 'true'}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          GIT_AUTHOR_NAME: amplitude-sdk-bot
          GIT_AUTHOR_EMAIL: amplitude-sdk-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: amplitude-sdk-bot
          GIT_COMMITTER_EMAIL: amplitude-sdk-bot@users.noreply.github.com
        run: |
          npm ci
          npm exec semantic-release -- --dry-run

      - name: Semantic Release
        if: ${{ github.event.inputs.dryRun == 'false'}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          GIT_AUTHOR_NAME: amplitude-sdk-bot
          GIT_AUTHOR_EMAIL: amplitude-sdk-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: amplitude-sdk-bot
          GIT_COMMITTER_EMAIL: amplitude-sdk-bot@users.noreply.github.com
        run: |
          npm ci
          npm exec semantic-release
